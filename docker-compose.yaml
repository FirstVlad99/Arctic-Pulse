networks:
  news-network:
    driver: bridge

volumes:
  postgres_data:
  directus_uploads:
  n8n_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news-network
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
      image: adminer:latest
      container_name: adminer
      restart: unless-stopped
      ports:
        - "8080:8080"
      networks:
        - news-network
      environment:
        ADMINER_DEFAULT_SERVER: db
    
  directus:
    image: directus/directus:11.0.0
    container_name: directus
    networks:
      - news-network
    ports:
      - "${DIRECTUS_PORT}:8055"
    volumes:
      - directus_uploads:/directus/uploads
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "pg"
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/server/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      postgres:
       # directus подождет, пока postgres запустится
          condition: service_healthy

  n8n:
    image: n8nio/n8n:1.123.51
    container_name: n8n
    networks:
      - news-network
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # Basic auth
      N8N_BASIC_AUTH_ACTIVE: true
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # основные настройки
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      # db
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: ${DB_NAME}
      DB_POSTGRESDB_USER: ${DB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  # Сервис для однократного импорта workflow при запуске
  n8n-migrate:
    image: n8nio/n8n:1.123.51
    container_name: n8n-migrate
    networks:
      - news-network
    volumes:
      - ./n8n/workflows:/workflows:ro
    environment:
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: ${DB_NAME}
      DB_POSTGRESDB_USER: ${DB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
    entrypoint: ["/bin/sh"]
    command: >
      -c "
      echo '=== Workflow Migration Service ===' &&
      echo 'Waiting for database...' &&
      sleep 10 &&
      if [ -d /workflows ]; then
        echo 'Found workflows directory' &&
        ls -la /workflows/ &&
        for f in /workflows/*.json; do
          if [ -f \"$$f\" ]; then
            echo 'Importing:' $$(basename \"$$f\") &&
            n8n import:workflow --separate --input=\"$$f\"
          fi
        done
      else
        echo 'No workflows directory found'
      fi &&
      echo 'Migration completed'"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - news-network
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - directus
      - n8n
    restart: unless-stopped

  directus-init:
    build:
      context: .  # текущая директория (корень проекта)
      dockerfile: Dockerfile-init
    container_name: directus-init
    networks:
      - news-network
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DIRECTUS_PORT: ${DIRECTUS_PORT:-8055}
      DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_started     
    restart: "no"  # запускается один раз и останавливается
